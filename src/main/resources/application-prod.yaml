spring:
  sql:
    init:
      mode: always
      encoding: UTF-8

  datasource:
    url: ${host}
    username: ${name}
    password: ${pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    #database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create

    defer-datasource-initialization: true